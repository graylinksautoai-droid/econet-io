<!DOCTYPE html>
<html>
<head>
    <title>Quick Login Fix</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .container { max-width: 400px; margin: 0 auto; }
        .button { background: #10b981; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        .button:hover { background: #059669; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #333; background: #2a2a2a; color: white; border-radius: 5px; }
        h2 { text-align: center; color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Quick Login Fix</h2>
        <p style="text-align: center; margin-bottom: 20px;">If the app is freezing during login, use this bypass:</p>
        
        <input type="email" id="email" placeholder="Enter your email" value="demo@econet.io">
        <input type="text" id="name" placeholder="Your name" value="Demo User">
        
        <button class="button" onclick="quickLogin()">
            ⚡ Quick Login (Demo Mode)
        </button>
        
        <button class="button" onclick="clearStorage()" style="background: #dc2626;">
            🗑️ Clear All Data & Reset
        </button>
        
        <div id="status" style="margin-top: 20px; text-align: center;"></div>
    </div>

    <script>
        function quickLogin() {
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            
            const demoUser = {
                _id: 'demo-user',
                name: name,
                email: email,
                reputation: { trustScore: 85 },
                verifiedReporter: true,
                avatar: 'https://via.placeholder.com/150'
            };
            
            const token = 'demo-token-' + Date.now();
            
            // Store in localStorage
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(demoUser));
            
            // Show success
            document.getElementById('status').innerHTML = '✅ Login successful! Redirecting...';
            
            // Redirect to app
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        }
        
        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('status').innerHTML = '🗑️ All data cleared! Refresh the page.';
        }
    </script>
</body>
</html>
